---
layout: default
navbar_title: Blog
---

<div class="row justify-content-center">
    <div class="col-12 col-lg-10">
        <article class="my-3 p-4 p-md-5 bg-white shadow-sm rounded-sm">
            <header class="mb-4 pb-3 border-bottom border-gray">
                <h1 class="mb-2">{{ page.title }}</h1>
                <div class="text-muted"><i>{{ page.date | date: "%B %d, %Y" }}</i></div>
            </header>
            <div class="blog-content">
                {{ content }}
            </div>
        </article>
        <div class="mb-5">
            <a href="{{ '/blogs' | relative_url }}" class="text-decoration-none">&larr; Back to Blog</a>
        </div>
    </div>
</div>
